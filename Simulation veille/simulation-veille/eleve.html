<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VEILLE-ILI - veille informationnelle</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-mode="student">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="./assets/branding/hawk-logo.png" alt="" />
        <div>
          <h1>VEILLE-ILI</h1>
          <p>Fil social fictif de veille</p>
        </div>
      </div>
      <div class="toolbar" aria-label="Contrôles de scénario">
        <label class="select-wrap">
          <span>Scénario</span>
          <select id="scenarioSelect"></select>
        </label>

      </div>
    </header>
    <main class="layout">
      <aside class="left-panel">
        <section class="panel identity-panel">
          <img class="side-logo" src="./assets/branding/hawk-logo.png" alt="" />
          <strong>VEILLE-ILI</strong>
          <span>Surveillance du fil en direct</span>
        </section>
        <section class="panel">
          <div class="panel-heading"><h2>Contexte</h2><span id="postCount" class="metric"></span></div>
          <p id="scenarioBrief" class="brief"></p>
          <div class="scenario-meta" id="scenarioMeta"></div>
        </section>
        <section class="panel"><h2>Tendances</h2><div id="trendList" class="trend-list"></div></section>
      </aside>
      <section class="feed-shell" aria-label="Fil de publications">
        <div class="feed-title">
          <div><h2>Accueil</h2><span>Flux simulé · heure de Paris</span></div>
          <div class="feed-title-actions">
            <button id="refreshFeedBtn" class="icon-button refresh-feed-button" title="Actualiser le fil" aria-label="Actualiser le fil"><span aria-hidden="true">↻</span></button>
            <span class="live-pill">LIVE</span>
          </div>
        </div>
        <div class="feed-tools">
          <div class="segmented" role="group" aria-label="Filtre du fil">
            <button class="segment is-active" data-filter="all">Tout</button>
            <button class="segment" data-filter="flagged">Signalés</button>
            <button class="segment" data-filter="media">Avec visuel</button>
          </div>
          <label class="search-box"><span aria-hidden="true">⌕</span><input id="searchInput" type="search" placeholder="Rechercher" /></label>
        </div>
        <div id="feed" class="feed"></div>
      </section>
      <aside class="right-panel">
        <section class="panel investigation">
          <div class="panel-heading"><h2>Signalements</h2><button id="clearFlags" class="icon-button small" title="Réinitialiser">↺</button></div>
          <div class="score-grid">
            <div><strong id="flaggedCount">0</strong><span>posts retenus</span></div>
            <div><strong id="confidenceScore">0%</strong><span>couverture</span></div>
          </div>
          <div id="flagList" class="flag-list empty">Aucun post signalé pour le moment.</div>
        </section>
      </aside>
    </main>

    <dialog id="annotationDialog" class="dialog">
      <form method="dialog" id="annotationForm">
        <h2>Annoter le signalement</h2>
        <p id="annotationPost" class="dialog-post"></p>
        <label>Indice principal
          <select id="flagReason">
            <option value="Coordination">Coordination apparente</option>
            <option value="Source faible">Source faible ou absente</option>
            <option value="Émotion">Ton émotionnel ou alarmiste</option>
            <option value="Faux expert">Autorité douteuse</option>
            <option value="Image douteuse">Visuel douteux</option>
          </select>
        </label>
        <label>Note
          <textarea id="flagNote" rows="4" placeholder="Pourquoi ce post mérite-t-il attention ?"></textarea>
        </label>
        <menu>
          <button value="cancel" class="text-button">Annuler</button>
          <button value="default" id="saveAnnotation" class="primary-button">Enregistrer</button>
        </menu>
      </form>
    </dialog>
    <dialog id="profileDialog" class="dialog profile-dialog">
      <form method="dialog">
        <div id="profileContent"></div>
        <menu><button value="cancel" class="text-button">Fermer</button></menu>
      </form>
    </dialog>

<div id="answerKey" hidden></div>
    <input id="fileInput" type="file" accept="application/json,.json" hidden />
    <script src="./app.js"></script>
  </body>
</html>
